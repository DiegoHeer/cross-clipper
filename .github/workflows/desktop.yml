name: Desktop

on:
  pull_request:
    paths:
      - "clients/desktop/**"
      - "packages/core/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/desktop.yml"
  push:
    branches: [main]
    paths:
      - "clients/desktop/**"
      - "packages/core/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/desktop.yml"

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  desktop:
    name: Desktop (test + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: package-lock.json

      # Tauri v2 Linux build prerequisites.
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libwebkit2gtk-4.1-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev libxdo-dev \
            libdbus-1-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: clients/desktop/src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck --workspace @crossclipper/desktop

      - name: Test
        run: npm run test --workspace @crossclipper/desktop

      - name: Build (TS)
        run: npm run build --workspace @crossclipper/desktop

      - name: Cargo fmt
        run: cargo fmt --all --check
        working-directory: clients/desktop/src-tauri

      - name: Cargo clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: clients/desktop/src-tauri

      - name: Cargo test
        run: cargo test
        working-directory: clients/desktop/src-tauri

  windows-build:
    name: Windows bundle (build smoke)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Tauri build (NSIS + MSI)
        run: npm run tauri --workspace @crossclipper/desktop -- build

      - uses: actions/upload-artifact@v7
        with:
          name: crossclipper-windows-installers
          path: |
            clients/desktop/src-tauri/target/release/bundle/nsis/*-setup.exe
            clients/desktop/src-tauri/target/release/bundle/msi/*.msi
