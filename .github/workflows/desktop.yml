name: Desktop

on:
  pull_request:
    paths:
      - "clients/desktop/**"
      - "packages/core/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/desktop.yml"
  push:
    branches: [main]
    paths:
      - "clients/desktop/**"
      - "packages/core/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/desktop.yml"

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Desktop (typecheck + test + cargo check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: package-lock.json

      # Tauri v2 Linux build prerequisites (cargo check only; bundling is the
      # windows job's concern, added with the full CI task).
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libwebkit2gtk-4.1-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev libxdo-dev \
            libdbus-1-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: clients/desktop/src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck --workspace @crossclipper/desktop

      - name: Test
        run: npm run test --workspace @crossclipper/desktop

      - name: Cargo check
        run: cargo check --manifest-path clients/desktop/src-tauri/Cargo.toml
