name: Extension

on:
  pull_request:
    paths:
      - 'clients/extension/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/extension.yml'
  push:
    branches:
      - main
    paths:
      - 'clients/extension/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/extension.yml'

concurrency:
  group: extension-${{ github.ref }}
  cancel-in-progress: true

jobs:
  extension:
    name: Extension (test + build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck --workspace @crossclipper/extension

      - name: Test
        run: npm run test --workspace @crossclipper/extension

      - name: Build
        run: npm run build --workspace @crossclipper/extension
