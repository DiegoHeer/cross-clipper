name: Mobile

on:
  pull_request:
    paths:
      - 'clients/mobile/**'
      - 'packages/core/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/mobile.yml'
  push:
    branches:
      - main
    paths:
      - 'clients/mobile/**'
      - 'packages/core/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/mobile.yml'

concurrency:
  group: mobile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mobile:
    name: Mobile (typecheck + test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck --workspace @crossclipper/mobile

      - name: Test
        run: npm run test --workspace @crossclipper/mobile
